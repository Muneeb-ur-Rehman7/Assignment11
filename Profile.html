<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<header class="bg-secondary p-3">
  <div class="container d-flex justify-content-between align-items-center">
    <h1 class="text-info m-0">Assignment 1</h1>
    <nav>
      <ul class="nav">
        <li class="nav-item"><a class="nav-link text-light" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-light" href="students.html">Students</a></li>
        <li class="nav-item"><a class="nav-link text-light" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-light" href="login.html">Login</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="container my-5">

  
  <div class="card shadow p-4 mb-4 text-center">
    <div class="position-relative d-inline-block">
      <img src="./img/images.jfif" class="rounded-circle mx-auto mb-3" width="120">
   
      <button class="btn btn-dark btn-sm position-absolute top-0 end-0" 
              data-bs-toggle="offcanvas" data-bs-target="#editDrawer">
        Edit
      </button>
    </div>
    <h3 class="mt-3">M. Ali Khan</h3>
    <p class="text-muted">BS Computer Science</p>
  </div>


  <div class="progress" role="progressbar" aria-label="Example with label" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar" style="width: 50%" >50%</div>
</div>

  
  <ul class="nav nav-tabs" id="studentTabs" role="tablist" style="margin: 20px;">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#assignments">Assignments</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#quizzes">Quizzes</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#attendance">Attendance</button></li>
  </ul>

  
  <div class="tab-content bg-white p-3 shadow">
    <div class="tab-pane fade show active" id="assignments">
      <table class="table table-bordered">
        <thead><tr><th>Title</th><th>Topic</th><th>Deadline</th><th>Submitted Date</th></tr></thead>
        <tbody>
          <tr><td>Html</td><td>Html Forms</td><td>10th July, 2026</td><td>6th July, 2026</td></tr>
        </tbody>
      </table>
    </div>

    <div class="tab-pane fade" id="quizzes">
      <table class="table table-bordered">
        <thead><tr><th>Quiz</th><th>Marks</th></tr></thead>
        <tbody>
          <tr><td>Quiz 1</td><td>18/20</td></tr>
          <tr><td>Quiz 2</td><td>16/20</td></tr>
        </tbody>
      </table>
    </div>

    <div class="tab-pane fade" id="attendance">
      <table class="table table-bordered">
        <thead><tr><th>Date</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>01 July</td><td>Present</td></tr>
          <tr><td>02 July</td><td>Absent</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <a href="Home.html" class="btn btn-secondary mt-4">Back</a>
</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="editDrawer">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Edit Student Details</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <form>
      <div class="mb-3">
        <label for="studentName" class="form-label">Name</label>
        <input type="text" class="form-control" id="studentName" placeholder="Name">
      </div>
      <div class="mb-3">
        <label for="studentBatch" class="form-label">Batch</label>
        <input type="text" class="form-control" id="studentBatch" placeholder="BS Computer Science">
      </div>
      <div class="mb-3">
        <label for="studentPic" class="form-label">Profile Picture</label>
        <input type="url" class="form-control" id="studentPic" placeholder="Pic">
      </div>
      <div class="mb-3">
        <label for="studentEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="studentEmail" placeholder="student@example.com">
      </div>
      <button type="submit" class="btn btn-success">Save Changes</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
