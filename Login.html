<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

 <header class="bg-secondary p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="text-info m-0">Students</h1>

            <nav>
                <ul class="nav">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="home.html">Home</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link text-light" href="Students.html">Student</a>
                    </li>
                   
                    <li class="nav-item">
                        <a class="nav-link text-light" href="dashboard.html">Dashboard</a>
                    </li>
                  
                </ul>
            </nav>
        </div>
    </header>
    

  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow">
          <div class="card-body">
            <h4 class="text-center mb-4">Login</h4>
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
